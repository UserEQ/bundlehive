# Publishes the @usereq/bundlehive* packages to npm via Changesets.
#
# On push to main:
#   - if there are pending changesets → opens/updates a "Version Packages" PR
#   - once that PR is merged (versions bumped) → publishes to npm
#
# Prerequisites (see docs/PUBLISHING.md):
#   - each package has a `build` script (tsup) emitting dist/ + .d.ts
#   - CLI bin points at dist/cli.js with a Node shebang
#   - `bunx changeset init` run; root `version`/`release` scripts added
#   - repo secret NPM_TOKEN set (npm automation token for the @usereq scope)
name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # push version-bump commits / tags
      pull-requests: write # open the "Version Packages" PR
      # id-token: write  # only needed for npm provenance — re-add if the repo
      # is made public and NPM_CONFIG_PROVENANCE is re-enabled below.
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build

      - name: Create Release PR or publish to npm
        uses: changesets/action@v1
        with:
          version: bun run version # `changeset version`
          publish: bun run release # `changeset publish`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Provenance is disabled while the repo is private — npm rejects
          # provenance bundles from private source repos. To re-enable: make the
          # repo public, uncomment `id-token: write` above and the line below.
          # NPM_CONFIG_PROVENANCE: "true"

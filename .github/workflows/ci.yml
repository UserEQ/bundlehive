# Typecheck + build on every push and PR.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - name: Build packages
        run: bun run build # examples typecheck/build against the built dist
      - name: Link workspace bins
        # The `bundlehive` CLI bin points at packages/cli/dist/cli.js, which does
        # not exist at the first install. On Linux, bun skips linking a bin whose
        # target is missing (macOS creates a dangling symlink that later resolves,
        # which is why this only bites in CI). Re-installing now that dist exists
        # links the bin so the example `bundlehive build` scripts resolve.
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun --filter '*' typecheck
      - name: Build examples
        run: |
          bun --filter '@usereq/bundlehive-example-counter' build
          bun --filter '@usereq/bundlehive-example-floating-badge' build
          bun --filter '@usereq/bundlehive-example-loader-chat' build
